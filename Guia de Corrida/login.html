<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro e Login</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    .hidden {
      display: none;
    }
  </style>
</head>

<body class="corpo">
  <hr size="4px" color="#0cc0df" class="linha-cima-cadastro" />

  <header>
    <div class="wrapper">
      <div class="logo">
        <a href="index.html"><img src="./img/logo.png" alt="Guia de Corrida"></a>
      </div>
      <nav>
        <ul id="menu">
          <li><a href="index.html#sobre">Sobre</a></li>
          <li><a href="preparacao.html">Preparação</a></li>
          <li><a href="execucao.html">Execução</a></li>
          <li><a href="recuperacao.html">Recuperação</a></li>
          <li><a href="contato.html">Contato</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="containerAll containerAllCadastro">
    <div class="containerImagem">
      <img src="../img/logo.png" class="imagem-logo-cadastro" alt="Logo do site">
    </div>

    <!-- FORMULÁRIO DE CADASTRO -->
    <div class="container-cadastro" id="formCadastro">
      <h1 class="titulo">Cadastro</h1>
      <span class="linha-fina linha-fina-cadastro"></span>

      <label class="label">Nome</label>
      <input type="text" class="input" id="iptNome">

      <label class="label">Email</label>
      <input type="text" class="input" id="iptEmail">

      <label class="label">Telefone</label>
      <input type="text" class="input" id="iptTelefone" placeholder="(xx)x xxxx-xxxx">

      <label class="label">Senha</label>
      <input type="password" class="input" id="iptSenha">

      <label class="label">Confirme a senha</label>
      <input type="password" class="input" id="iptConfirmacaoSenha">

      <label class="label">Código de confirmação</label>
      <input type="text" class="input" id="iptCodigo" placeholder="informe um codigo">

      <button onclick="cadastro()" class="botao">CRIAR</button>
      <button onclick="mostrarLogin()" class="botao botao-jatenho-conta">JÁ POSSUO CADASTRO</button>
    </div>

    <!-- FORMULÁRIO DE LOGIN -->
    <div class="container-cadastro hidden" id="formLogin">
      <h1 class="titulo">Login</h1>
      <span class="linha-fina linha-fina-cadastro"></span>

      <label class="label">Email</label>
      <input type="text" class="input" id="loginEmail">

      <label class="label">Senha</label>
      <input type="password" class="input" id="loginSenha">

      <button onclick="fazerLogin()" class="botao">ENTRAR</button>
      <button onclick="mostrarCadastro()" class="botao botao-jatenho-conta">VOLTAR AO CADASTRO</button>
    </div>
  </div>

  <hr size="4px" color="#0cc0df" class="linha-baixo-cadastro" />

  <script>
    function mostrarLogin() {
      document.getElementById("formCadastro").classList.add("hidden");
      document.getElementById("formLogin").classList.remove("hidden");
    }

    function mostrarCadastro() {
      document.getElementById("formLogin").classList.add("hidden");
      document.getElementById("formCadastro").classList.remove("hidden");
    }

    function cadastro() {
      const nome = iptNome.value.trim().toLowerCase();
      const email = iptEmail.value.trim();
      const telefone = iptTelefone.value.trim();
      const senha = iptSenha.value;
      const confirmacaoSenha = iptConfirmacaoSenha.value;
      const codigo = iptCodigo.value.trim().toLowerCase();

      if (!nome || !email || !telefone || !senha || !confirmacaoSenha || !codigo) {
        return alert('Todos os campos precisam ser preenchidos!');
      }

      if (senha !== confirmacaoSenha) return alert('Senhas não coincidem.');
      if (telefone.length !== 11) return alert('Telefone inválido!');
      if (senha.length < 5) return alert('A senha precisa ter pelo menos 5 dígitos!');
      if (!email.includes("@")) return alert('Email inválido!');
      if (codigo !== 'abc123') return alert('Código inválido!');

      const usuario = { nome, email, telefone, senha };
      localStorage.setItem("usuario", JSON.stringify(usuario));

      alert('Cadastro realizado! Seja bem-vindo(a)!');
      mostrarLogin();
    }

    function fazerLogin() {
      const email = document.getElementById("loginEmail").value.trim();
      const senha = document.getElementById("loginSenha").value;

      const usuario = JSON.parse(localStorage.getItem("usuario"));

      if (!email || !senha) return alert("Preencha email e senha!");
      if (!usuario || usuario.email !== email || usuario.senha !== senha) {
        return alert("Email ou senha inválidos!");
      }

      alert("Login realizado com sucesso!");
      // window.location.href = "criar minha pagina do login.html";
    }
  </script>

  <footer>
    <h2 style="color: white; font-size: 15px;">Projeto Desenvolvido por Edson Felix – SPTECH</h2>
    <div class="redes">
      <a href="https://www.linkedin.com/in/code85ed/" class="social-link" target="_blank" rel="noopener noreferrer">
        LinkedIn<i class="fab fa-linkedin"></i>
      </a>
      <a href="https://github.com/85ED" class="social-link" target="_blank" rel="noopener noreferrer">
        GitHub<i class="fab fa-git"></i>
      </a>
    </div>
  </footer>

</body>

</html>



<!--
Validações aplicadas:
- Nenhum campo pode estar vazio.
- Senha e confirmação devem coincidir.
- CNPJ deve ser válido e não conter números todos iguais.
- Telefone deve ter 11 dígitos válidos.
- Código de confirmação deve ser exatamente "abc123".
-->

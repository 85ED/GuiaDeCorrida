<body>
  <header>
    <div class="wrapper">
      <div class="logo">
        <a href="index.html"><img src="./img/logo.png" alt="Guia de Corrida"></a>

      <nav>

    </div>
    </div>

  <div style="display: flex; max-width: 800px; margin: auto;">
    <div style="flex: 1;">
      <img src="./img/3.jpg" alt="Caixa de Correio" style="max-width: 100%;">
    </div>

    <div style="flex: 1; padding: 20px;">
      <h2>Fale Conosco</h2>
      <form onsubmit="verificarFormulario(); return false;">
        <label>Nome:</label><br>
        <input type="text" name="nome"><br><br>
        <label>Email:</label><br>
        <input type="text" name="email"><br><br>
        <label>Mensagem:</label><br>
        <textarea name="mensagem" rows="4"></textarea><br><br>
        <input type="submit" value="Enviar">
      </form>
    </div>
  </div>

</html>

<script>
  function verificarFormulario() {
    var nome = document.forms[0].nome.value;
    var email = document.forms[0].email.value;
    var mensagem = document.forms[0].mensagem.value;

    if (nome == "" || email == "" || mensagem == "") {
      alert("Por favor, preencha todos os campos.");
    } else {
      alert("Mensagem enviada com sucesso! Em breve entraremos em contato.");
      nome.value = "";
      email.value = "";
      mensagem.value = "";
    }
  }
</script>
